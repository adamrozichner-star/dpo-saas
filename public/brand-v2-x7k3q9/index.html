<style>
/* ===== design tokens (colors_and_type.css, inlined) ===== */
/* ============================================================
   Deepo Design System - Colors & Type
   v2.0 - Warm rebrand
   ============================================================
   Brand thesis (he): "הגנת פרטיות מקצועית - במחיר נגיש לכולם."
   Brand thesis (en): "Professional privacy protection - within everyone's reach."
   Personality: a warm champion who fights exposure FOR you.
   Approachable, plain-spoken, confident. Service-led, not tech-led.
   ============================================================ */



:root {
  /* ─────────────────────────────────────────────
     COLOR - Brand ramps
     Lifted straight from the new logo: wine → crimson → red → coral → orange,
     with a magenta "spark" accent.
     ───────────────────────────────────────────── */

  /* Crimson - PRIMARY brand. The heart of the mark. */
  --crimson-700: #9B0140;  /* deepest wine */
  --crimson-600: #B8033B;
  --crimson-500: #D10331;  /* anchor crimson */
  --crimson-400: #E5294C;
  --crimson-300: #F06A82;
  --crimson-200: #F8B8C4;
  --crimson-100: #FCE4E9;
  --crimson-50:  #FDF1F4;

  /* Ember - the red core of the gradient. */
  --ember-600: #E5301F;
  --ember-500: #F4271F;  /* anchor red */
  --ember-400: #FE5E2C;
  --ember-100: #FDE5DF;

  /* Coral - the warm bridge to orange. */
  --coral-500: #FF8154;
  --coral-400: #FF9A75;
  --coral-100: #FFEAE0;

  /* Amber - the bright end of the gradient. */
  --amber-600: #F07816;
  --amber-500: #FF9D21;  /* anchor orange */
  --amber-400: #FFB24D;
  --amber-200: #FFD9A3;
  --amber-100: #FFF1DE;

  /* Spark - magenta accent, the logo's floating dot + sparkle top.
     Use as a tiny pop only: highlights, the "alive" detail. */
  --spark-500: #FE2EAF;
  --spark-400: #FF63C4;
  --spark-100: #FFE0F4;

  /* ─────────────────────────────────────────────
     BRAND GRADIENT - the defining visual element
     Wine → crimson → red → coral → orange, diagonal as in the logo.
     Use sparingly: logo, hero accents, key CTAs.
     ───────────────────────────────────────────── */
  --brand-gradient: linear-gradient(105deg, #9B0140 0%, #D10331 26%, #F4271F 52%, #FF7A3C 79%, #FF9D21 100%); /* @kind color */
  --brand-gradient-soft: linear-gradient(105deg, #FCE4E9 0%, #FDE5DF 45%, #FFEAE0 72%, #FFF1DE 100%); /* @kind color */
  --brand-gradient-vertical: linear-gradient(170deg, #9B0140 0%, #D10331 26%, #F4271F 52%, #FF7A3C 79%, #FF9D21 100%); /* @kind color */
  --brand-gradient-radial: radial-gradient(circle at 26% 18%, #9B0140 0%, #D10331 28%, #F4271F 56%, #FF8154 80%, #FF9D21 100%); /* @kind color */
  /* Spark-tipped variant for special moments (matches the sparkle). */
  --spark-gradient: linear-gradient(165deg, #FE2EAF 0%, #FF6E72 46%, #FFC23D 100%); /* @kind color */

  /* ─────────────────────────────────────────────
     ONYX - the dark anchor surface (replaces the old navy "Vault").
     Near-black with a warm amber undertone (black-amber), not wine.
     ───────────────────────────────────────────── */
  --garnet-1000: #120B03;  /* deepest, warm near-black */
  --garnet-900:  #1B1308;  /* PRIMARY dark surface */
  --garnet-800:  #29200F;  /* elevated surface on dark */
  --garnet-700:  #3C2E16;  /* hover/active on dark */
  --garnet-500:  #7C6D52;  /* secondary text on dark */
  --garnet-300:  #BBAC93;  /* muted text on dark */

  /* ─────────────────────────────────────────────
     SAND - warm neutral surface ramp (replaces "Parchment").
     Cream with a faint blush, anti-clinical.
     ───────────────────────────────────────────── */
  --sand-50:  #FDF9F5;
  --sand-100: #FBF4EE;  /* page background, warmest */
  --sand-200: #F5EBE2;  /* card / sunken panel */
  --sand-300: #EBDED2;  /* divider on warm bg */
  --sand-400: #DBCABA;  /* border on warm bg */

  /* ─────────────────────────────────────────────
     STONE - warm-tinted gray ramp for type & UI on light surfaces.
     ───────────────────────────────────────────── */
  --stone-50:  #F6F3F0;
  --stone-100: #ECE6E1;
  --stone-200: #D8CEC6;
  --stone-300: #B4A89E;
  --stone-400: #897C72;
  --stone-500: #635850;
  --stone-600: #453D38;
  --stone-700: #2E2825;
  --stone-800: #1C1815;

  /* ─────────────────────────────────────────────
     STATUS - calm, and distinct from the (red) brand.
     ───────────────────────────────────────────── */
  --status-ok:     #128A55;  /* deep emerald, reads as "protected" */
  --status-ok-bg:  #E3F3EA;
  --status-warn:   #C77E0C;  /* rich ochre-amber */
  --status-warn-bg:#FBEBD2;
  --status-risk:   #B81B2F;  /* deep brick - darker/bluer than brand so it stays distinct */
  --status-risk-bg:#FAE2E3;
  --status-info:   #2766A6;  /* steady blue, the one cool note */
  --status-info-bg:#E5EDF6;

  /* ─────────────────────────────────────────────
     COLOR - Semantic roles (use these in product code)
     ───────────────────────────────────────────── */
  --bg-page:      var(--sand-100);
  --bg-surface:   #FFFFFF;
  --bg-sunken:    var(--sand-200);
  --bg-inverse:   var(--garnet-900);
  --bg-inverse-2: var(--garnet-800);

  --fg-1:         var(--stone-800);   /* primary text on light */
  --fg-2:         var(--stone-600);   /* secondary text */
  --fg-3:         var(--stone-400);   /* muted / captions */
  --fg-on-dark-1: #FDF4EF;            /* primary text on dark */
  --fg-on-dark-2: var(--garnet-300);  /* secondary on dark */
  --fg-accent:    var(--crimson-500);
  --fg-link:      var(--crimson-600);

  --border-1:     var(--sand-300);
  --border-2:     var(--sand-400);
  --border-strong:var(--garnet-900);
  --border-on-dark: rgba(255,255,255,0.10);

  --focus-ring:   var(--crimson-500);

  /* ─────────────────────────────────────────────
     TYPE - Families
     Hebrew-first, professional & standard. Rubik (headings + brand),
     Assistant (body) - both carry Hebrew natively. Heebo for labels (clean in Hebrew).
     ───────────────────────────────────────────── */
  --font-brand:   "Rubik", ui-sans-serif, system-ui, sans-serif;               /* brand display moments */
  --font-display: "Rubik", "Assistant", ui-sans-serif, system-ui, sans-serif;  /* headings (he+en) */
  --font-body:    "Assistant", "Rubik", ui-sans-serif, system-ui, sans-serif;  /* body (he+en) */
  --font-mono:    "Heebo", ui-sans-serif, system-ui, sans-serif;               /* eyebrows / labels (he+en) */

  /* ─────────────────────────────────────────────
     TYPE - Scale (rem-based; 1rem = 16px)
     ───────────────────────────────────────────── */
  --t-display-xl: 5.5rem;   /* 88px */
  --t-display-l:  4rem;     /* 64px */
  --t-display-m:  3rem;     /* 48px */
  --t-h1:         2.25rem;  /* 36px */
  --t-h2:         1.75rem;  /* 28px */
  --t-h3:         1.375rem; /* 22px */
  --t-h4:         1.125rem; /* 18px */
  --t-body:       1rem;     /* 16px */
  --t-body-sm:    0.875rem; /* 14px */
  --t-caption:    0.75rem;  /* 12px */
  --t-eyebrow:    0.6875rem;/* 11px tracked-out label */

  /* Line heights */
  --lh-tight:   1.06;  /* @kind other */
  --lh-snug:    1.2;   /* @kind other */
  --lh-normal:  1.5;   /* @kind other */
  --lh-relaxed: 1.65;  /* @kind other */  /* Hebrew reads better with a touch more leading */

  /* Letter spacing - Hebrew never gets negative tracking */
  --tr-tight:   -0.02em; /* @kind other */
  --tr-snug:    -0.01em; /* @kind other */
  --tr-normal:  0;       /* @kind other */
  --tr-wide:    0.06em;  /* @kind other */
  --tr-wider:   0.12em;  /* @kind other */  /* eyebrow caps */

  /* ─────────────────────────────────────────────
     SPACING - 4px base
     ───────────────────────────────────────────── */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;

  /* ─────────────────────────────────────────────
     RADII - soft, friendly (a touch rounder to echo the wordmark)
     ───────────────────────────────────────────── */
  --radius-xs: 5px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --radius-2xl: 30px;
  --radius-pill: 999px;

  /* ─────────────────────────────────────────────
     SHADOWS - restrained; warm-tinted so they sit on sand.
     ───────────────────────────────────────────── */
  --shadow-lift-1: 0 1px 2px rgba(58, 4, 24, 0.06), 0 1px 1px rgba(58, 4, 24, 0.05);
  --shadow-lift-2: 0 4px 12px rgba(58, 4, 24, 0.07), 0 2px 4px rgba(58, 4, 24, 0.05);
  --shadow-lift-3: 0 12px 32px rgba(58, 4, 24, 0.10), 0 4px 8px rgba(58, 4, 24, 0.05);
  --shadow-lift-4: 0 24px 60px rgba(58, 4, 24, 0.14), 0 8px 16px rgba(58, 4, 24, 0.07);

  --shadow-inset-1: inset 0 1px 0 rgba(255,255,255,0.6);
  --shadow-inset-dark: inset 0 1px 0 rgba(255,255,255,0.05);

  --shadow-halo:      0 0 0 4px rgba(209, 3, 49, 0.20);   /* focus + crimson */
  --shadow-halo-amber:0 0 0 4px rgba(255, 157, 33, 0.28);
  --shadow-glow:      0 0 60px rgba(209, 3, 49, 0.32);    /* dark-bg accent */
  --shadow-glow-amber:0 0 60px rgba(255, 157, 33, 0.30);

  /* ─────────────────────────────────────────────
     MOTION
     ───────────────────────────────────────────── */
  --ease-out:  cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */
  --ease-in:   cubic-bezier(0.55, 0, 1, 0.45); /* @kind other */
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);   /* @kind other */
  --dur-1: 120ms; /* @kind other */
  --dur-2: 200ms; /* @kind other */
  --dur-3: 320ms; /* @kind other */
  --dur-4: 520ms; /* @kind other */

  /* ============================================================
     BACK-COMPAT ALIASES - map v0.1 (cool) token names onto v2 (warm)
     so existing slides / ui_kits / preview keep rendering while we
     migrate them. Prefer the new names above in all NEW work.
     ============================================================ */
  --vault-1000: var(--garnet-1000);
  --vault-900:  var(--garnet-900);
  --vault-800:  var(--garnet-800);
  --vault-700:  var(--garnet-700);
  --vault-500:  var(--garnet-500);
  --vault-300:  var(--garnet-300);

  --iris-600: var(--crimson-600);
  --iris-500: var(--crimson-500);
  --iris-400: var(--crimson-400);
  --iris-200: var(--crimson-200);
  --iris-100: var(--crimson-100);

  --beam-600: var(--ember-600);
  --beam-500: var(--ember-500);
  --beam-400: var(--ember-400);
  --beam-100: var(--ember-100);

  --aqua-600: var(--coral-500);
  --aqua-500: var(--coral-500);
  --aqua-400: var(--coral-400);
  --aqua-100: var(--coral-100);

  --signal-600: var(--amber-600);
  --signal-500: var(--amber-500);
  --signal-400: var(--amber-400);
  --signal-300: var(--amber-200);
  --signal-200: var(--amber-100);
  --signal-100: var(--amber-100);

  --parchment-100: var(--sand-100);
  --parchment-200: var(--sand-200);
  --parchment-300: var(--sand-300);
  --parchment-400: var(--sand-400);

  --slate-50:  var(--stone-50);
  --slate-100: var(--stone-100);
  --slate-200: var(--stone-200);
  --slate-300: var(--stone-300);
  --slate-400: var(--stone-400);
  --slate-500: var(--stone-500);
  --slate-600: var(--stone-600);
  --slate-700: var(--stone-700);
  --slate-800: var(--stone-800);
}

/* ============================================================
   SEMANTIC TYPE STYLES
   ============================================================ */

.t-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--t-eyebrow);
  font-weight: 500;
  letter-spacing: var(--tr-wider);
  text-transform: uppercase;
  color: var(--fg-2);
}

.t-display-xl,
.t-display-l,
.t-display-m {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: var(--tr-tight);
  line-height: var(--lh-tight);
  color: var(--fg-1);
  text-wrap: balance;
}
.t-display-xl { font-size: var(--t-display-xl); }
.t-display-l  { font-size: var(--t-display-l); }
.t-display-m  { font-size: var(--t-display-m); }

/* Brand display - Rubik 600/700, for prominent brand moments (hero numerals, marketing). */
.t-brand {
  font-family: var(--font-brand);
  font-weight: 600;
  letter-spacing: var(--tr-snug);
  line-height: var(--lh-tight);
  color: var(--fg-1);
}

.t-h1 {
  font-family: var(--font-display);
  font-size: var(--t-h1);
  font-weight: 600;
  letter-spacing: var(--tr-snug);
  line-height: var(--lh-snug);
  color: var(--fg-1);
  text-wrap: balance;
}
.t-h2 {
  font-family: var(--font-display);
  font-size: var(--t-h2);
  font-weight: 600;
  letter-spacing: var(--tr-snug);
  line-height: var(--lh-snug);
  color: var(--fg-1);
  text-wrap: balance;
}
.t-h3 {
  font-family: var(--font-display);
  font-size: var(--t-h3);
  font-weight: 600;
  line-height: var(--lh-snug);
  color: var(--fg-1);
}
.t-h4 {
  font-family: var(--font-display);
  font-size: var(--t-h4);
  font-weight: 600;
  line-height: var(--lh-snug);
  color: var(--fg-1);
}

.t-body, p {
  font-family: var(--font-body);
  font-size: var(--t-body);
  font-weight: 400;
  line-height: var(--lh-relaxed);
  color: var(--fg-1);
  text-wrap: pretty;
}
.t-body-sm {
  font-family: var(--font-body);
  font-size: var(--t-body-sm);
  font-weight: 400;
  line-height: var(--lh-normal);
  color: var(--fg-2);
}
.t-caption {
  font-family: var(--font-body);
  font-size: var(--t-caption);
  font-weight: 400;
  line-height: var(--lh-normal);
  color: var(--fg-3);
}
.t-mono {
  font-family: var(--font-mono);
  font-size: var(--t-body-sm);
  font-weight: 400;
  letter-spacing: var(--tr-normal);
  color: var(--fg-2);
}

/* Gradient text helper - paints any text in the brand gradient. */
.t-gradient {
  background: var(--brand-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* ============================================================
   BASE
   ============================================================ */

* { box-sizing: border-box; }
html, body {
  margin: 0;
  background: var(--bg-page);
  color: var(--fg-1);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* RTL helpers for Hebrew-first usage */
[dir="rtl"] { text-align: right; }
[dir="rtl"] .t-eyebrow { letter-spacing: var(--tr-wide); } /* tracked caps loosen less in he */

/* ===== deck system (deck.css, inlined) ===== */
/* ============================================================
   DeePO Slide System - base layout for 1280×720 slides
   ============================================================ */



html, body { margin: 0; padding: 0; background: var(--vault-1000); }

.slide {
  width: 1280px; height: 720px;
  position: relative; overflow: hidden;
  font-family: var(--font-body);
  display: flex; flex-direction: column;
}

/* Background variants */
.slide.bg-light  { background: var(--parchment-100); color: var(--fg-1); }
.slide.bg-tint   { background: var(--parchment-200); color: var(--fg-1); }
.slide.bg-vault  {
  color: var(--fg-on-dark-1);
  background-color: #1A1108;
  background-image:
    radial-gradient(ellipse 72% 80% at 0% 100%, rgba(209,3,49,0.68) 0%, rgba(244,39,31,0.40) 24%, rgba(255,157,33,0.22) 46%, transparent 70%),
    radial-gradient(ellipse 40% 48% at 2% 96%, rgba(255,157,33,0.34) 0%, transparent 58%);
}
.slide.bg-deep   {
  color: var(--fg-on-dark-1);
  background-color: #140C04;
  background-image:
    radial-gradient(ellipse 72% 80% at 0% 100%, rgba(209,3,49,0.64) 0%, rgba(244,39,31,0.36) 24%, rgba(255,157,33,0.20) 46%, transparent 70%),
    radial-gradient(ellipse 40% 48% at 2% 96%, rgba(255,157,33,0.30) 0%, transparent 58%);
}

/* Common slide chrome */
.slide-frame { padding: 72px 96px; flex: 1; display: flex; flex-direction: column; }

.slide-header {
  position: absolute; top: 36px; left: 96px; right: 96px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 5;
}
.slide-header img { height: 40px; }
.slide-header .stamp {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fg-3);
}
.bg-vault .slide-header .stamp,
.bg-deep .slide-header .stamp { color: var(--vault-300); }

.slide-footer {
  position: absolute; bottom: 36px; left: 96px; right: 96px;
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--fg-3); z-index: 5;
}
.bg-vault .slide-footer,
.bg-deep .slide-footer { color: var(--vault-300); }

/* Concentric ring backdrop - bottom-right radial */
.rings-bg {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.rings-bg .r {
  position: absolute; border-radius: 50%;
  border: 1.5px solid rgba(209,3,49,0.13);
  right: -180px; bottom: -180px;
  transform: translateZ(0);
}
.bg-vault .rings-bg .r,
.bg-deep .rings-bg .r { border-color: rgba(255,150,70,0.28); }
.rings-bg .r:nth-child(1) { width: 480px;  height: 480px; }
.rings-bg .r:nth-child(2) { width: 720px;  height: 720px; opacity: 0.85; }
.rings-bg .r:nth-child(3) { width: 980px;  height: 980px; opacity: 0.6; }
.rings-bg .r:nth-child(4) { width: 1280px; height: 1280px; opacity: 0.4; }

/* Aurora halo backdrop - gradient glow for dark slides */
.aurora-bg {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.aurora-bg::before {
  content: ""; position: absolute;
  width: 1100px; height: 1100px; border-radius: 50%;
  left: -260px; top: -240px;
  background: radial-gradient(circle, rgba(209,3,49,0.52) 0%, rgba(244,39,31,0.30) 34%, rgba(255,157,33,0.18) 56%, transparent 72%);
  filter: blur(20px);
}
.aurora-bg::after {
  content: ""; position: absolute;
  width: 820px; height: 820px; border-radius: 50%;
  right: -180px; bottom: -240px;
  background: radial-gradient(circle, rgba(255,157,33,0.30) 0%, rgba(255,129,84,0.16) 42%, transparent 72%);
  filter: blur(20px);
}

/* Typography */
.eyebrow {
  font-family: var(--font-mono); font-size: 14px; font-weight: 500;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--fg-3); margin: 0 0 24px;
}
.bg-vault .eyebrow,
.bg-deep .eyebrow  { color: var(--signal-500); }

.h-hero {
  font-family: var(--font-display); font-weight: 500;
  font-size: 92px; line-height: 1.02; letter-spacing: -0.025em;
  margin: 0; text-wrap: balance;
}
.h-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 64px; line-height: 1.05; letter-spacing: -0.02em;
  margin: 0; text-wrap: balance;
}
.h-section {
  font-family: var(--font-display); font-weight: 600;
  font-size: 32px; line-height: 1.15; letter-spacing: -0.01em;
  margin: 0;
}
.h-stat {
  font-family: var(--font-display); font-weight: 500;
  font-size: 180px; line-height: 0.95; letter-spacing: -0.04em;
  margin: 0;
}
.lede {
  font-family: var(--font-body); font-size: 24px; line-height: 1.45;
  color: var(--fg-2); max-width: 820px; margin: 24px 0 0; text-wrap: pretty;
}
.bg-vault .lede,
.bg-deep .lede { color: var(--vault-300); }

.accent { color: var(--signal-500); }

/* ===== single-file shell ===== */
html, body { margin:0; background:#000; }
deck-stage:not(:defined) { visibility:hidden; }
deck-stage > section { width:1280px; height:720px; }

/* language toggle */
#langtoggle {
  position:fixed; top:14px; left:14px; z-index:2147483647;
  display:flex; gap:2px; padding:3px;
  background:rgba(27,19,8,.72); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.14); border-radius:999px;
  font-family:"Heebo",sans-serif; box-shadow:0 4px 14px rgba(0,0,0,.3);

<script>
/**
 * <deck-stage> — reusable web component for HTML decks.
 *
 * Handles:
 *  (a) speaker notes — reads <script type="application/json" id="speaker-notes">
 *      and posts {slideIndexChanged: N} to the parent window on nav.
 *  (b) keyboard navigation — ←/→, PgUp/PgDn, Space, Home/End, number keys.
 *  (c) press R to reset to slide 0 (with a tasteful keyboard hint).
 *  (d) bottom-center overlay showing slide count + hints, fades out on idle.
 *  (e) auto-scaling — inner canvas is a fixed design size (default 1920×1080)
 *      scaled with `transform: scale()` to fit the viewport, letterboxed.
 *      Set the `noscale` attribute to render at authored size (1:1) — the
 *      PPTX exporter sets this so its DOM capture sees unscaled geometry.
 *  (f) print — `@media print` lays every slide out as its own page at the
 *      design size, so the browser's Print → Save as PDF produces a clean
 *      one-page-per-slide PDF with no extra setup.
 *  (g) thumbnail rail — resizable left-hand column of per-slide thumbnails
 *      (static clones). Click to navigate; ↑/↓ with a thumbnail focused to
 *      step between slides; drag to reorder; right-click for
 *      Skip / Move up / Move down / Delete (opens a Cancel/Delete confirm
 *      dialog). Drag the rail's right edge to resize; width persists to
 *      localStorage. Skipped slides carry `data-deck-skip`, are dimmed in
 *      the rail, omitted from prev/next navigation, and hidden at print.
 *      The rail is suppressed in presenting mode, in the host's Preview
 *      mode (ViewerMode='none'), on `noscale`, and via the `no-rail`
 *      attribute. Rail mutations dispatch a `deckchange`
 *      CustomEvent on the element: detail = {action, from, to, slide}.
 *
 * Slides are HIDDEN, not unmounted. Non-active slides stay in the DOM with
 * `visibility: hidden` + `opacity: 0`, so their state (videos, iframes,
 * form inputs, React trees) is preserved across navigation.
 *
 * Lifecycle event — the component dispatches a `slidechange` CustomEvent on
 * itself whenever the active slide changes (including the initial mount).
 * The event bubbles and composes out of shadow DOM, so you can listen on
 * the <deck-stage> element or on document:
 *
 *   document.querySelector('deck-stage').addEventListener('slidechange', (e) => {
 *     e.detail.index         // new 0-based index
 *     e.detail.previousIndex // previous index, or -1 on init
 *     e.detail.total         // total slide count
 *     e.detail.slide         // the new active slide element
 *     e.detail.previousSlide // the prior slide element, or null on init
 *     e.detail.reason        // 'init' | 'keyboard' | 'click' | 'tap' | 'api'
 *   });
 *
 * Persistence: none at the deck level. The host app keeps the current slide
 * in its own URL (?slide=) and re-delivers it via location.hash on load, so a
 * bare load with no hash always starts at slide 1.
 *
 * Usage:
 *   <style>deck-stage:not(:defined){visibility:hidden}</style>
 *   <deck-stage width="1920" height="1080">
 *     <section data-label="Title">...</section>
 *     <section data-label="Agenda">...</section>
 *   </deck-stage>
 *   <script src="deck-stage.js"><\/script>
 *
 * The :not(:defined) rule prevents a flash of the first slide at its
 * authored styles before this script runs and attaches the shadow root.
 *
 * Slides are the direct element children of <deck-stage>. Each slide is
 * automatically tagged with:
 *   - data-screen-label="NN Label"   (1-indexed, for comment flow)
 *   - data-om-validate="no_overflowing_text,no_overlapping_text,slide_sized_text"
 */

(() => {
  const DESIGN_W_DEFAULT = 1920;
  const DESIGN_H_DEFAULT = 1080;
  const OVERLAY_HIDE_MS = 1800;
  const VALIDATE_ATTR = 'no_overflowing_text,no_overlapping_text,slide_sized_text';

  const pad2 = (n) => String(n).padStart(2, '0');

  // Label precedence: data-label → data-screen-label (number stripped) → first heading → "Slide".
  const getSlideLabel = (el) => {
    const explicit = el.getAttribute('data-label');
    if (explicit) return explicit;

    const existing = el.getAttribute('data-screen-label');
    if (existing) return existing.replace(/^\s*\d+\s*/, '').trim() || existing;

    const h = el.querySelector('h1, h2, h3, [data-title]');
    const t = h && (h.textContent || '').trim().slice(0, 40);
    if (t) return t;

    return 'Slide';
  };

  const stylesheet = `
    :host {
      position: fixed;
      inset: 0;
      display: block;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    /* connectedCallback holds this until document.fonts.ready (capped 2s) so
     * the first visible paint has the deck's real typography + final rail
     * layout. opacity (not visibility) so the active slide can't un-hide
     * itself via the ::slotted([data-deck-active]) visibility:visible rule.
     * Only the stage/rail hide — the black :host background stays, so the
     * iframe doesn't flash the page's default white. */
    :host([data-fonts-pending]) .stage,
    :host([data-fonts-pending]) .rail { opacity: 0; pointer-events: none; }

    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas {
      position: relative;
      transform-origin: center center;
      flex-shrink: 0;
      background: #fff;
      will-change: transform;
    }

    /* Slides live in light DOM (via <slot>) so authored CSS still applies.
       We absolutely position each slotted child to stack them. */
    ::slotted(*) {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    ::slotted([data-deck-active]) {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    /* Tap zones for mobile — back/forward thirds like Stories.
       Transparent, no visible UI, don't block the overlay. */
    .tapzones {
      position: fixed;
      inset: 0;
      display: flex;
      z-index: 2147482000;
      pointer-events: none;
    }
    .tapzone {
      flex: 1;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    /* Only activate tap zones on coarse pointers (touch devices). */
    @media (hover: hover) and (pointer: fine) {
      .tapzones { display: none; }
    }

    .overlay {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 6px) scale(0.92);
      filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      background: #000;
      color: #fff;
      border-radius: 999px;
      font-size: 12px;
      font-feature-settings: "tnum" 1;
      letter-spacing: 0.01em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.8,.2,1), filter 260ms ease;
      transform-origin: center bottom;
      z-index: 2147483000;
      user-select: none;
    }
    .overlay[data-visible] {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
      filter: blur(0);
    }

    .btn {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 0;
      margin: 0;
      padding: 0;
      color: inherit;
      font: inherit;
      cursor: default;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      min-width: 28px;
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      transition: background 140ms ease, color 140ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .btn:active { background: rgba(255,255,255,0.18); }
    .btn:focus { outline: none; }
    .btn:focus-visible { outline: none; }
    .btn::-moz-focus-inner { border: 0; }
    .btn svg { width: 14px; height: 14px; display: block; }
    .btn.reset {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 0 10px 0 12px;
      gap: 6px;
      color: rgba(255,255,255,0.72);
    }
    .btn.reset .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      line-height: 1;
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }

    .count {
      font-variant-numeric: tabular-nums;
      color: #fff;
      font-weight: 500;
      padding: 0 8px;
      min-width: 42px;
      text-align: center;
      font-size: 12px;
    }
    .count .sep { color: rgba(255,255,255,0.45); margin: 0 3px; font-weight: 400; }
    .count .total { color: rgba(255,255,255,0.55); }

    .divider {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.18);
      margin: 0 2px;
    }

    /* ── Thumbnail rail ──────────────────────────────────────────────────
       Fixed column on the left; each thumbnail is a static deep-clone of
       the light-DOM slide scaled into a 16:9 (or design-aspect) frame. The
       stage re-fits around it (see _fit); hidden during present / noscale
       / print so capture geometry and fullscreen output are unchanged. */
    .rail {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--deck-rail-w, 188px);
      background: #141414;
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 2147482500;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.18) transparent;
    }

    /* ── Print: one page per slide, no chrome ────────────────────────────
       The screen layout stacks every slide at inset:0 inside a scaled
       canvas; for print we want them in document flow at the authored
       design size so the browser paginates one slide per sheet. The
       @page size is set from the width/height attributes via the inline
       <style id="deck-stage-print-page"> that connectedCallback injects
       into <head> (the @page at-rule has no effect inside shadow DOM). */

        inset: auto;

        color: inherit;

        height: auto !important;

         break-after:page and prints a blank sheet. _markLastVisible()

  class DeckStage extends HTMLElement {
    static get observedAttributes() { return ['width', 'height', 'noscale', 'no-rail']; }

      this._notes = [];

      this._mouseIdleTimer = null;
      this._menuIndex = -1;

      this._onKey = this._onKey.bind(this);
      this._onResize = this._onResize.bind(this);
      this._onSlotChange = this._onSlotChange.bind(this);
      this._onMouseMove = this._onMouseMove.bind(this);
      this._onTapBack = this._onTapBack.bind(this);
      this._onTapForward = this._onTapForward.bind(this);
      this._onMessage = this._onMessage.bind(this);

      // ignore clicks that land inside the menu itself — otherwise the
      // capture handler runs before the menu's own (bubble) handler and
      // clears _menuIndex out from under it.
      this._onDocClick = (e) => {
        if (this._menu && e.composedPath && e.composedPath().includes(this._menu)) return;
        this._closeMenu();
      };
    }

    get designWidth() {
      return parseInt(this.getAttribute('width'), 10) || DESIGN_W_DEFAULT;
    }
    get designHeight() {
      return parseInt(this.getAttribute('height'), 10) || DESIGN_H_DEFAULT;
    }

    connectedCallback() {
      // Presenter-view popup loads deckUrl?_snthumb=...#N for its prev/cur/
      // next thumbnails — the rail has no business rendering inside those
      // (wrong scale, and it offsets the stage so the thumb shows a gutter).
      if (/[?&]_snthumb=/.test(location.search)) this.setAttribute('no-rail', '');
      this._render();
      this._loadNotes();
      this._syncPrintPageRule();
      window.addEventListener('keydown', this._onKey);
      window.addEventListener('resize', this._onResize);
      window.addEventListener('mousemove', this._onMouseMove, { passive: true });
      window.addEventListener('message', this._onMessage);
      window.addEventListener('click', this._onDocClick, true);
      // Initial collection + layout happens via slotchange, which fires on mount.
      this._enableRail();
      // Hold the stage hidden until webfonts are ready so the first visible
      // paint has the deck's real typography — the :not(:defined) guard in
      // the page HTML only covers custom-element upgrade, not font load.
      // Capped so a 404'd font URL can't blank the deck indefinitely.
      this.setAttribute('data-fonts-pending', '');
      const reveal = () => this.removeAttribute('data-fonts-pending');

      // resolved the slotted text's font-family and pushed a FontFace into
      // 'loading'. Reading it here in connectedCallback (parse-time) would
      // settle the race in a microtask before any font fetch starts.
      requestAnimationFrame(() => {
        Promise.race([
          document.fonts ? document.fonts.ready : Promise.resolve(),
          new Promise((r) => setTimeout(r, 2000)),
        ]).then(reveal, reveal);

    }

    _enableRail() {

      // no-rail guard keeps the observers/stylesheet walk off the cheap path
      // for presenter-popup thumbnail iframes (up to 9 per view).
      if (this._railEnabled || this.hasAttribute('no-rail')) return;
      this._railEnabled = true;

      // only a stored '0' (from the TweaksPanel toggle) hides it.

      } catch (e) {}

      // edits and re-clone just the affected thumb(s), debounced. Ignore
      // the data-deck-* / data-screen-label / data-om-validate attributes
      // this component itself writes so nav and skip don't trigger
      // spurious refreshes.

      this._liveObserver = new MutationObserver((records) => {
        for (const r of records) {
          if (r.type === 'attributes' && OWN_ATTRS.test(r.attributeName || '')) continue;
          let n = r.target;

          if (n && this._slideSet && this._slideSet.has(n)) this._liveDirty.add(n);
        }

      // ~4 thumbs of pre-load so fast scrolling doesn't flash blanks.
      this._railObserver = new IntersectionObserver((entries) => {
        entries.forEach((e) => {

      // (on <html>, <body>, a wrapper div, or a <style> tag), which
      // _liveObserver can't see. Re-snapshot author CSS (constructable
      // sheet is shared by reference, so one replaceSync updates every
      // thumb shadow root) and re-sync each thumb host's attrs + custom
      // properties. In-slide DOM mutations are _liveObserver's job.
      // Debounced so slider drags don't thrash.
      this._onTweakChange = () => {
        clearTimeout(this._tweakTimer);
        this._tweakTimer = setTimeout(() => {
          this._snapshotAuthorCss();
          // One getComputedStyle for the whole batch — each
          // getPropertyValue read below reuses the same computed style
          // as long as nothing invalidates layout between thumbs.
          const cs = getComputedStyle(this);

            if (t.host) this._syncThumbHostAttrs(t.host, cs);
          });

      };
      window.addEventListener('tweakchange', this._onTweakChange);
      this._snapshotAuthorCss();
      // Build the rail now that it's enabled — slotchange already fired,
      // so _renderRail's early-return skipped the initial build.
      this._syncRailHidden();
      this._renderRail();
      this._fit();
    }

    /** Snapshot document stylesheets into a constructable sheet that each
     *  thumbnail's nested shadow root adopts — so author CSS styles the
     *  cloned slide content without touching this component's chrome.
     *  Cross-origin sheets throw on .cssRules — skip them. Re-callable:
     *  the existing constructable sheet is reused via replaceSync so every
     *  already-adopted shadow root picks up the fresh CSS without re-adopt. */
    _snapshotAuthorCss() {
      // :root in an adopted sheet inside a shadow root matches nothing
      // (only the document root qualifies), so author rules like
      // `:root[data-voice="modern"] .serif` never reach the clones.
      // Rewrite :root → :host and mirror <html>'s data-*/class/lang onto
      // each thumb host (see _syncThumbHostAttrs) so the same selectors
      // match inside the thumbnail's shadow tree.
      const authorCss = Array.from(document.styleSheets).map((sh) => {
        try {
          return Array.from(sh.cssRules).map((r) => r.cssText).join('\n');
        } catch (e) { return ''; }
      }).join('\n')
        // The shadow host is featureless outside the functional :host(...)
        // form, so any compound on :root — [attr], .class, #id, :pseudo —
        // must become :host(<compound>) not :host<compound>. Same for the
        // html type selector (Tailwind class-strategy dark mode emits
        // html.dark; Pico uses html[data-theme]), which has nothing to
        // match inside the thumb's shadow tree.
        .replace(/:root((?:\[[^\]]*\]|[.#][-\w]+|:[-\w]+(?:\([^)]*\))?)+)/g, ':host($1)')
        .replace(/:root\b/g, ':host')
        .replace(/(^|[\s,>~+(}])html((?:\[[^\]]*\]|[.#][-\w]+|:[-\w]+(?:\([^)]*\))?)+)(?![-\w])/g, '$1:host($2)')
        .replace(/(^|[\s,>~+(}])html(?![-\w])/g, '$1:host');
      // Every custom property the author references. _syncThumbHostAttrs
      // mirrors each one's *computed* value at <deck-stage> onto the
      // thumb host so the live value wins over the :host default above
      // regardless of which ancestor the tweak wrote to (<html>, <body>,
      // a wrapper div, or the deck-stage element itself all inherit
      // down to getComputedStyle(this)).
      this._authorVars = new Set(authorCss.match(/--[\w-]+/g) || []);
      try {
        if (!this._adoptedSheet) this._adoptedSheet = new CSSStyleSheet();
        this._adoptedSheet.replaceSync(authorCss);
      } catch (e) {
        this._adoptedSheet = null;
        this._authorCss = authorCss;
      }
    }

    _syncThumbHostAttrs(host, cs) {
      const de = document.documentElement;
      // setAttribute overwrites but can't delete — an attr removed from
      // <html> (toggleAttribute off, classList emptied) would linger on
      // the host and :host([data-*]) / :host(.foo) rules would keep
      // matching. Remove stale mirrored attrs first; iterate backward
      // because removeAttribute mutates the live NamedNodeMap.
      for (let i = host.attributes.length - 1; i >= 0; i--) {
        const n = host.attributes[i].name;
        if ((n.startsWith('data-') || n === 'class' || n === 'lang')
            && !de.hasAttribute(n)) {
          host.removeAttribute(n);
        }
      }
      for (const a of de.attributes) {
        if (a.name.startsWith('data-') || a.name === 'class' || a.name === 'lang') {
          host.setAttribute(a.name, a.value);
        }
      }
      // The :root→:host rewrite in _snapshotAuthorCss pins each custom
      // property to its stylesheet default on the thumb host, shadowing
      // the live value that would otherwise inherit. Tweaks can write the
      // live value on any ancestor — <html>, <body>, a wrapper div, the
      // deck-stage element — so read it as the *computed* value at
      // <deck-stage> (which sees the whole inheritance chain) rather than
      // trying to guess which element the author wrote to. Inline on the
      // host beats the :host{} rule. remove-stale covers vars dropped
      // from the stylesheet between snapshots.
      const vars = this._authorVars || new Set();
      for (let i = host.style.length - 1; i >= 0; i--) {
        const p = host.style[i];
        if (p.startsWith('--') && !vars.has(p)) host.style.removeProperty(p);
      }
      const live = cs || getComputedStyle(this);
      vars.forEach((p) => {
        const v = live.getPropertyValue(p);
        if (v) host.style.setProperty(p, v.trim());
        else host.style.removeProperty(p);
      });
    }

    disconnectedCallback() {
      window.removeEventListener('keydown', this._onKey);
      window.removeEventListener('resize', this._onResize);
      window.removeEventListener('mousemove', this._onMouseMove);
      window.removeEventListener('message', this._onMessage);
      window.removeEventListener('click', this._onDocClick, true);
      if (this._hideTimer) clearTimeout(this._hideTimer);
      if (this._mouseIdleTimer) clearTimeout(this._mouseIdleTimer);
      if (this._liveTimer) clearTimeout(this._liveTimer);
      if (this._tweakTimer) clearTimeout(this._tweakTimer);
      if (this._railAnimTimer) clearTimeout(this._railAnimTimer);
      if (this._scaleRaf) cancelAnimationFrame(this._scaleRaf);
      if (this._liveObserver) this._liveObserver.disconnect();
      if (this._railObserver) this._railObserver.disconnect();
      if (this._onTweakChange) window.removeEventListener('tweakchange', this._onTweakChange);
    }

    attributeChangedCallback() {
      if (this._canvas) {
        this._canvas.style.width = this.designWidth + 'px';
        this._canvas.style.height = this.designHeight + 'px';
        this._canvas.style.setProperty('--deck-design-w', this.designWidth + 'px');
        this._canvas.style.setProperty('--deck-design-h', this.designHeight + 'px');
        if (this._rail) {
          this._rail.style.setProperty('--deck-aspect', this.designWidth + '/' + this.designHeight);
        }
        this._fit();
        this._scaleThumbs();
        this._syncPrintPageRule();
      }
    }

    _render() {

      style.textContent = stylesheet;

      const stage = document.createElement('div');
      stage.className = 'stage';

      const canvas = document.createElement('div');
      canvas.className = 'canvas';
      canvas.style.width = this.designWidth + 'px';
      canvas.style.height = this.designHeight + 'px';
      canvas.style.setProperty('--deck-design-w', this.designWidth + 'px');
      canvas.style.setProperty('--deck-design-h', this.designHeight + 'px');

      const slot = document.createElement('slot');
      slot.addEventListener('slotchange', this._onSlotChange);
      canvas.appendChild(slot);
      stage.appendChild(canvas);

      tapzones.setAttribute('data-omelette-chrome', '');

      tzBack.className = 'tapzone tapzone--back';
      const tzMid = document.createElement('div');
      tzMid.className = 'tapzone tapzone--mid';
      tzMid.style.pointerEvents = 'none';
      const tzFwd = document.createElement('div');
      tzFwd.className = 'tapzone tapzone--fwd';
      tzBack.addEventListener('click', this._onTapBack);
      tzFwd.addEventListener('click', this._onTapForward);
      tapzones.append(tzBack, tzMid, tzFwd);

      const overlay = document.createElement('div');
      overlay.className = 'overlay export-hidden';
      overlay.setAttribute('role', 'toolbar');
      overlay.setAttribute('aria-label', 'Deck controls');
      overlay.setAttribute('data-omelette-chrome', '');

        <button class="btn next" type="button" aria-label="Next slide" title="Next (→)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3l5 5-5 5"/></svg>

      overlay.querySelector('.next').addEventListener('click', () => this._advance(1, 'click'));
