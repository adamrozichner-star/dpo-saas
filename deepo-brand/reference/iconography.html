<!-- @dsCard group="Brand" viewport="700x300" subtitle="Duotone (soft fill + line) · warm brand color" name="Iconography" -->
<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="../assets/deepo-icons.js"></script>
<style>
  html,body{margin:0;background:var(--bg-page);}
  .card{padding:24px 26px;font-family:var(--font-body);}
  .lbl{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--stone-400);}
  
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:14px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:9px;background:#fff;border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:16px 6px;}
  .ic .dpi{font-size:32px;--dpi-c:var(--crimson-500);}
  .ic span{font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;color:var(--stone-500);}
  .dark{background:var(--garnet-900);border-radius:var(--radius-lg);padding:16px;display:flex;gap:22px;justify-content:center;}
  .dark .dpi{font-size:30px;--dpi-c:var(--amber-500);}
</style></head><body><div class="card">
  <div class="grid">
    <div class="ic"><svg class="dpi"><use href="#dp-shield"></use></svg><span>Protection</span></div><div class="ic"><svg class="dpi"><use href="#dp-radar"></use></svg><span>Monitor</span></div><div class="ic"><svg class="dpi"><use href="#dp-doc"></use></svg><span>RoPA</span></div><div class="ic"><svg class="dpi"><use href="#dp-bell"></use></svg><span>Alert</span></div><div class="ic"><svg class="dpi"><use href="#dp-lock"></use></svg><span>Privacy</span></div><div class="ic"><svg class="dpi"><use href="#dp-seal"></use></svg><span>Compliant</span></div><div class="ic"><svg class="dpi"><use href="#dp-bolt"></use></svg><span>Proactive</span></div><div class="ic"><svg class="dpi"><use href="#dp-database"></use></svg><span>Data</span></div><div class="ic"><svg class="dpi"><use href="#dp-link"></use></svg><span>Vendors</span></div><div class="ic"><svg class="dpi"><use href="#dp-sparkle"></use></svg><span>AI</span></div>
  </div>
  <div class="dark">
    <svg class="dpi"><use href="#dp-shield"></use></svg><svg class="dpi"><use href="#dp-radar"></use></svg><svg class="dpi"><use href="#dp-doc"></use></svg><svg class="dpi"><use href="#dp-bell"></use></svg><svg class="dpi"><use href="#dp-lock"></use></svg><svg class="dpi"><use href="#dp-seal"></use></svg><svg class="dpi"><use href="#dp-bolt"></use></svg><svg class="dpi"><use href="#dp-database"></use></svg>
  </div>
</div></body></html>
